[package]
name = "cx"
version = "0.1.0"
edition = "2024"

[dependencies]
tree-sitter = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.23"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
clap = { version = "4", features = ["derive"] }
toon-format = "0.4"
walkdir = "2"

[dev-dependencies]
tempfile = "3"
